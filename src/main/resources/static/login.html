<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio de sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="inicio">
<main class="container d-flex justify-content-center align-items-center min-vh-100">
    <section class="card card-simple bg-white p-4" style="width: 390px;">
        <h1 class="h3 text-center titulo-panel mb-1">Consultas Médicas</h1>
        <p class="text-center text-secondary mb-4">Ingreso por rol</p>

        <div id="mensaje" class="alert alert-danger d-none"></div>

        <label for="user" class="form-label">Usuario</label>
        <input id="user" class="form-control mb-3" placeholder="pepito1">

        <label for="pass" class="form-label">Contraseña</label>
        <input id="pass" type="password" class="form-control mb-4" placeholder="1234">

        <button class="btn btn-success w-100" onclick="login()">Entrar</button>
        <a href="register.html" class="mt-3 text-center d-block">Crear usuario</a>
        <a href="index.html" class="mt-2 text-center d-block text-secondary">Volver al inicio</a>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
