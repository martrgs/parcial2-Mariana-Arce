<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="inicio">
<main class="container d-flex justify-content-center align-items-center min-vh-100">
    <section class="card card-simple bg-white p-4" style="width: 430px;">
        <h1 class="h3 text-center titulo-panel mb-4">Registro</h1>

        <div id="mensaje" class="alert alert-danger d-none"></div>

        <label for="user" class="form-label">Usuario</label>
        <input id="user" class="form-control mb-3" placeholder="pepito.1">

        <label for="nombreCompleto" class="form-label">Nombre completo</label>
        <input id="nombreCompleto" class="form-control mb-3"  placeholder="Pepito Pérez" maxlength="40" pattern="[A-Za-z0-9 ]+" required>

        <label for="pass" class="form-label">Contraseña</label>
        <input id="pass" type="password" class="form-control mb-3" placeholder="Mínimo 4 caracteres">

        <label for="role" class="form-label">Rol</label>
        <select id="role" class="form-select mb-4">
            <option value="ADMINISTRADOR">Administrador</option>
            <option value="MEDICO">Médico</option>
            <option value="PACIENTE">Paciente</option>
        </select>

        <button class="btn btn-success w-100" onclick="registrar()">Registrarse</button>
        <a href="login.html" class="d-block text-center mt-3">Volver al inicio</a>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
